name: Deploy to Production

on:
  push:
    tags:
      - '*'

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Extract version
        id: get_version
        run: |
          VERSION=$(./scripts/version.sh)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Deploying version: $VERSION"
      
      - name: Build Docker images
        env:
          DOCKER_BUILDKIT: 1
        run: |
          # Build images with version tag
          docker build --build-arg VERSION=${{ env.VERSION }} --build-arg APP_URL=${{ vars.APP_URL }} -t orbital-frontend:${{ env.VERSION }} -f docker/Dockerfile.frontend .
          docker build --build-arg VERSION=${{ env.VERSION }} -t orbital-backend:${{ env.VERSION }} -f docker/Dockerfile.backend .
      
      - name: Setup deployment directory
        run: |
          # Create deployment directory structure
          mkdir -p /opt/orbital/configs
          mkdir -p /opt/orbital/data/backend
          mkdir -p /opt/orbital/livekit
      
      - name: Copy default configs
        run: |
          # Copy default configs if they don't exist
          if [ ! -f /opt/orbital/configs/nginx.conf ]; then
            cp docker/nginx.conf /opt/orbital/configs/nginx.conf
            echo "Created default nginx.conf"
          fi
          
          # Copy LiveKit config (used by host-networked LiveKit container)
          if [ ! -f /opt/orbital/livekit/livekit.yaml ]; then
            cp livekit/livekit.yaml /opt/orbital/livekit/livekit.yaml
            echo "Created default livekit.yaml"
          fi
          
          # Create .env file if it doesn't exist
          if [ ! -f /opt/orbital/.env ]; then
            echo "LIVEKIT_API_KEY=your-api-key-change-in-production" > /opt/orbital/.env
            echo "LIVEKIT_API_SECRET=your-api-secret-change-in-production-min-32-chars" >> /opt/orbital/.env
            echo "LIVEKIT_URL=ws://localhost:7880" >> /opt/orbital/.env
            echo "Created default .env file"
          fi
      
      - name: Copy docker-compose file
        run: |
          # Copy deploy-specific compose file and substitute version
          sed "s/\${VERSION}/${{ env.VERSION }}/g" docker/docker-compose.deploy.yml > /opt/orbital/docker-compose.yml
      
      - name: Deploy
        run: |
          cd /opt/orbital
          
          # Deploy with docker compose
          docker compose up -d --remove-orphans
      
      - name: Cleanup old Docker images
        run: |
          # Remove old orbital images except current version
          docker images --format "table {{.Repository}}:{{.Tag}}" | grep "orbital-" | grep -v "${{ env.VERSION }}" | xargs -r docker rmi || true
          
          # Remove dangling images
          docker image prune -f
          
          echo "Deployment completed successfully!"
          echo "Version: ${{ env.VERSION }}"
