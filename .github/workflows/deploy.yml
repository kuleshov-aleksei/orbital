name: Deploy to Production

on:
  push:
    tags:
      - '*'

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Extract version
        id: get_version
        run: |
          VERSION=$(./scripts/version.sh)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Deploying version: $VERSION"
      
      - name: Build Docker images
        run: |
          # Build images with version tag
          docker build --build-arg VERSION=${{ env.VERSION }} -t orbital-frontend:${{ env.VERSION }} -f docker/Dockerfile.frontend .
          docker build --build-arg VERSION=${{ env.VERSION }} -t orbital-backend:${{ env.VERSION }} -f docker/Dockerfile.backend .
      
      - name: Setup deployment directory
        run: |
          # Create deployment directory structure
          mkdir -p /opt/orbital/configs
          mkdir -p /opt/orbital/data/turn
      
      - name: Copy default configs
        run: |
          # Copy default configs if they don't exist
          if [ ! -f /opt/orbital/configs/nginx.conf ]; then
            cp docker/nginx.conf /opt/orbital/configs/nginx.conf
            echo "Created default nginx.conf"
          fi
          
          if [ ! -f /opt/orbital/configs/turnserver.conf ]; then
            cp docker/turnserver.conf /opt/orbital/configs/turnserver.conf
            echo "Created default turnserver.conf"
          fi
          
          # Create .env file if it doesn't exist
          if [ ! -f /opt/orbital/.env ]; then
            echo "TURN_SECRET=your-shared-secret-change-in-production" > /opt/orbital/.env
            echo "TURN_URL=turn:localhost:3478" >> /opt/orbital/.env
            echo "TURN_TLS_URL=turns:localhost:5349" >> /opt/orbital/.env
            echo "STUN_URLS=stun:stun.l.google.com:19302,stun:stun1.l.google.com:19302" >> /opt/orbital/.env
            echo "Created default .env file"
          fi
      
      - name: Copy docker-compose file
        run: |
          # Copy deploy-specific compose file and substitute version
          sed "s/\${VERSION}/${{ env.VERSION }}/g" docker/docker-compose.deploy.yml > /opt/orbital/docker-compose.yml
      
      - name: Deploy
        run: |
          cd /opt/orbital
          
          # Deploy with docker compose
          docker compose up -d --remove-orphans
      
      - name: Cleanup old Docker images
        run: |
          # Remove old orbital images except current version
          docker images --format "table {{.Repository}}:{{.Tag}}" | grep "orbital-" | grep -v "${{ env.VERSION }}" | xargs -r docker rmi || true
          
          # Remove dangling images
          docker image prune -f
          
          echo "Deployment completed successfully!"
          echo "Version: ${{ env.VERSION }}"
