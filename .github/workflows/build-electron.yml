name: Build Electron App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, linux, x64]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: get_version
        run: |
          VERSION=$(./scripts/version.sh)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building version: $VERSION"

      - name: Build Electron in Docker
        run: |
          docker build \
            --build-arg VERSION=${{ env.VERSION }} \
            --build-arg VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }} \
            -t orbital-electron-build \
            -f docker/Dockerfile.electron .

      - name: Copy artifacts
        run: |
          docker create --name orbital-extract orbital-electron-build
          docker cp orbital-extract:/app/electron/release ./electron
          docker rm orbital-extract

      - name: Create Release and Upload Assets
        if: github.ref_type == 'tag'
        run: |
          # Create draft release
          gh release create ${{ env.VERSION }} \
            --title "Orbital Desktop ${{ env.VERSION }}" \
            --draft \
            --notes "Automated build"

          # Upload each asset
          for asset in electron/release/*.exe electron/release/*.exe.sha256 electron/release/*.Portable*.exe electron/release/*.Portable*.exe.sha256 electron/release/*.AppImage electron/release/*.deb; do
            if [ -f "$asset" ]; then
              gh release upload ${{ env.VERSION }} "$asset" --clobber
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
