name: Build Electron App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, linux, x64]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        id: get_version
        run: |
          VERSION=$(./scripts/version.sh)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building version: $VERSION"

      - name: Build Electron in Docker
        run: |
          docker build \
            --build-arg VERSION=${{ env.VERSION }} \
            --build-arg VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }} \
            -t orbital-electron-build \
            -f docker/Dockerfile.electron .

      - name: Copy artifacts
        run: |
          docker create --name orbital-extract orbital-electron-build
          docker cp orbital-extract:/app/electron/release ./electron
          docker rm orbital-extract

      - name: Upload Release Assets
        if: github.ref_type == 'tag'
        uses: ncipollo/release-action@b7eabc95ff50cbeeedec83973935c8f306dfcd0b # v1.20.0
        with:
          artifacts: "electron/release/*.exe,electron/release/*.exe.sha256,electron/release/*.AppImage,electron/release/*.deb,electron/release/*.tar.gz"
          token: ${{ secrets.GITHUB_TOKEN }}
          commit: ${{ github.sha }}
          tag: desktop-v${{ env.VERSION }}
          name: Desktop v${{ env.VERSION }}
          body: "Automated build"
          draft: true
          

