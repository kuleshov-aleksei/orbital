# Orbital Backend Configuration
# This file contains default configuration values for the backend server
# Environment variables can override these values (see config/config.go for env var names)

# Server configuration
server:
  port: "8080"
  mode: "development"  # Options: development, production
  external_url: "http://localhost:5173"  # Frontend URL to redirect after OAuth
  electron_redirect_url: "orbital://auth/callback"  # Deep link URL for Electron OAuth callback
  cors_origins:
    - "*"

# TURN server configuration for WebRTC
# These settings control how clients connect to TURN/STUN servers
turn:
  shared_secret: "pink-goose"
  url: "turn:192.168.1.169:3478"
  tls_url: "turns:192.168.1.169:5349"
  stun_urls:
    - "stun:stun.l.google.com:19302"
    - "stun:stun1.l.google.com:19302"
  realm: "orbital"
  credential_lifetime: 86400  # 24 hours in seconds

# Room configuration
room:
  min_users: 2
  max_users: 6
  default_max_users: 6

# Security configuration
security:
  e2e_mode: false  # Enable E2E testing mode (allows test/reset endpoint)

# Database configuration
database:
  path: "./data/orbital.db"  # Path to SQLite database file

# Authentication & OAuth configuration
auth:
  jwt_secret: "change-this-in-production"  # Override with JWT_SECRET env var
  discord:
    client_id: ""      # Override with DISCORD_CLIENT_ID env var
    client_secret: ""  # Override with DISCORD_CLIENT_SECRET env var
    redirect_url: "http://localhost:8080/api/auth/discord/callback"
  google:
    client_id: ""      # Override with GOOGLE_CLIENT_ID env var
    client_secret: ""  # Override with GOOGLE_CLIENT_SECRET env var
    redirect_url: "http://localhost:8080/api/auth/google/callback"
  discord_electron_redirect_url: "http://127.0.0.1:27271/callback"
  google_electron_redirect_url: "http://127.0.0.1:27271/callback"

# Logging configuration
logging:
  level: "info"  # Options: debug, info, warn, error
  request_logging: true

# WebSocket configuration
websocket:
  ping_timeout: 30s  # Time without ping before disconnecting a user
  ping_check_interval: 10s  # How often to check for ping timeouts
