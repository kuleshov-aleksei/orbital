# This is a development docker compose. For deployment in production use docker/docker-compose.deploy.yml

services:
  livekit:
    image: livekit/livekit-server:v1.12.0
    container_name: orbital-livekit
    restart: unless-stopped
    command: >
      livekit-server
      --config /etc/livekit/livekit.yaml
    # Use host networking - LiveKit binds directly to host interfaces
    # This eliminates Docker networking overhead for media traffic
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./livekit/livekit-dev.yaml:/etc/livekit/livekit.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7880"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

