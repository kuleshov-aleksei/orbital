# TURN Server Configuration for Orbital
# This file configures coturn TURN/STUN server for WebRTC

# Listener ports
listening-port=3478
tls-listening-port=5349

# Network settings
listening-ip=0.0.0.0
relay-ip=0.0.0.0

# Relay port range
min-port=62000
max-port=65535

# Authentication (TURN REST API with shared secret)
# Note: use-auth-secret and static-auth-secret are passed via command line
# to allow environment variable substitution

# Realm for authentication
realm=orbital

# Logging
log-file=stdout

# Performance and abuse prevention
user-quota=10
# Each ICE candidate consume quota, so allow unlimited candidates
total-quota=0
# 50 Mb/s per session
max-bps=6553600
# 200 Mb/s
bps-capacity=26214400

# Security settings
fingerprint
no-multicast-peers
no-loopback-peers

# WebRTC optimizations
#no-tcp-relay

# Additional security
stale-nonce=3600
max-allocate-lifetime=3600
channel-lifetime=600
permission-lifetime=300
