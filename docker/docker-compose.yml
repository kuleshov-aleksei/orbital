services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        - VERSION=${VERSION:-dev-unknown}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend
    networks:
      - orbital-network

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      args:
        - VERSION=${VERSION:-dev-unknown}
    restart: unless-stopped
    env_file:
      - docker-data/.env
    environment:
      - GIN_MODE=release
      - PORT=8080
      - TURN_URL=${TURN_URL:-turn:localhost:3478}
      - TURN_TLS_URL=${TURN_TLS_URL:-turns:localhost:5349}
      - STUN_URLS=${STUN_URLS:-stun:stun.l.google.com:19302,stun:stun1.l.google.com:19302}
    depends_on:
      - turn-server
    networks:
      - orbital-network

  turn-server:
    image: coturn/coturn:latest
    restart: unless-stopped
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
      - "49152-65535:49152-65535/udp"
    env_file:
      - docker-data/.env
    volumes:
      - ./docker-data/configs/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - ./docker-data/data/turn:/var/lib/coturn
    command: >
      sh -c "
        turnserver
        -c /etc/coturn/turnserver.conf
        --use-auth-secret
        --static-auth-secret=$${TURN_SECRET}
      "
    networks:
      - orbital-network

networks:
  orbital-network:
    driver: bridge
