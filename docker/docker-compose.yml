services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
      - PORT=8080
      - TURN_SECRET=${TURN_SECRET:-your-shared-secret-change-in-production}
      - TURN_URL=turn:localhost:3478
      - TURN_TLS_URL=turns:localhost:5349
      - STUN_URLS=stun:stun.l.google.com:19302,stun:stun1.l.google.com:19302
    depends_on:
      - turn-server

  turn-server:
    image: coturn/coturn:latest
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
      - "49152-65535:49152-65535/udp"
    environment:
      - TURN_SECRET=${TURN_SECRET:-your-shared-secret-change-in-production}
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: >
      sh -c "
        turnserver
        -c /etc/coturn/turnserver.conf
        --use-auth-secret
        --static-auth-secret=$${TURN_SECRET}
      "

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
