pid /tmp/orbital-nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Use local log files instead of system logs
    error_log /tmp/orbital-logs/error.log;
    access_log /tmp/orbital-logs/access.log;

    server {
        listen 3000;
        server_name localhost;

        # Frontend static files - serve directly from dist folder
        location / {
            root ROOT_PLACEHOLDER;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache" always;
        }

        # WebSocket connections
        location /ws {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API endpoints
        location /api/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
