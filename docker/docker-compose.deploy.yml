services:
  frontend:
    image: orbital-frontend:${VERSION}
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - VITE_API_URL=http://localhost:8080/api
    depends_on:
      - backend
    networks:
      - orbital-network

  backend:
    image: orbital-backend:${VERSION}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - GIN_MODE=release
      - PORT=8080
      - LIVEKIT_URL=${LIVEKIT_URL:-ws://localhost:7880}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-dev_key}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-this_is_a_development_secret_key_32chars}
      - ROOM_MIN_USERS=2
      - ROOM_MAX_USERS=6
      - ROOM_DEFAULT_MAX_USERS=6
    volumes:
      - ./data/backend/:/root/data/
    depends_on:
      - livekit
    networks:
      - orbital-network

  # LiveKit uses host networking for optimal WebRTC performance
  # Media traffic (UDP 62000-65535, TCP 7881, UDP 3478) goes directly to host
  # Signaling (TCP 7880) can be routed through Traefik for SSL termination
  livekit:
    image: livekit/livekit-server:v1.11.0
    container_name: orbital-livekit
    restart: unless-stopped
    command: >
      livekit-server
      --config /etc/livekit/livekit.yaml
    # Use host networking - LiveKit binds directly to host interfaces
    # This eliminates Docker networking overhead for media traffic
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit/livekit.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7880"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  orbital-network:
    driver: bridge
